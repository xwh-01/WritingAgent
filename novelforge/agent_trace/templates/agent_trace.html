<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NovelForge Agent Trace</title>
    <style>
        :root {
            --bg: #eef2f1;
            --panel: #ffffff;
            --ink: #1f2933;
            --muted: #667085;
            --line: #d8ddd7;
            --teal: #0f766e;
            --red: #b42318;
            --blue: #2563eb;
            --radius: 6px;
        }
        * { box-sizing: border-box; margin: 0; }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font: 14px/1.5 "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
        }
        .shell {
            display: grid;
            grid-template-columns: 360px minmax(0, 1fr);
            gap: 18px;
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }
        .panel {
            min-width: 0;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
        }
        h1 { font-size: 22px; margin-bottom: 10px; }
        h2 { font-size: 14px; margin-bottom: 10px; }
        label {
            display: grid;
            gap: 6px;
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }
        input, textarea {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
            color: var(--ink);
            font: inherit;
        }
        textarea { min-height: 120px; resize: vertical; }
        button {
            width: 100%;
            min-height: 36px;
            border: 1px solid var(--teal);
            border-radius: var(--radius);
            background: var(--teal);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .status {
            margin-top: 12px;
            color: var(--muted);
            font-size: 12px;
        }
        .timeline {
            display: grid;
            gap: 10px;
        }
        .step {
            padding: 12px;
            border: 1px solid var(--line);
            border-left: 4px solid var(--teal);
            border-radius: var(--radius);
            background: #fff;
        }
        .step.failed { border-left-color: var(--red); }
        .step-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
            font-weight: 800;
        }
        .tool {
            color: var(--blue);
            font-family: Consolas, monospace;
            font-size: 12px;
        }
        pre {
            overflow-x: auto;
            margin-top: 8px;
            padding: 8px;
            border-radius: var(--radius);
            background: #f6f8f7;
            color: var(--muted);
            font-size: 12px;
            white-space: pre-wrap;
        }
        .summary {
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #f9fbfa;
        }
        @media (max-width: 860px) {
            .shell { grid-template-columns: 1fr; padding: 12px; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="panel">
            <h1>Agent Trace</h1>
            <label>
                Story ID
                <input id="storyId" value="{{ story_id }}" placeholder="story uuid">
            </label>
            <label>
                用户任务
                <textarea id="taskInput" placeholder="例如：继续写下一章 / 检查第5章人物有没有崩 / 看看还有哪些伏笔没回收"></textarea>
            </label>
            <label>
                Max Steps
                <input id="maxSteps" type="number" min="1" max="12" value="6">
            </label>
            <button id="runBtn">Run Director</button>
            <div class="status" id="status">Ready</div>
        </section>
        <section class="panel">
            <h2>Trace 时间线</h2>
            <div id="summary" class="summary">No run yet</div>
            <div id="timeline" class="timeline"></div>
        </section>
    </main>
    <script>
        const storyId = document.getElementById("storyId");
        const taskInput = document.getElementById("taskInput");
        const maxSteps = document.getElementById("maxSteps");
        const statusEl = document.getElementById("status");
        const summary = document.getElementById("summary");
        const timeline = document.getElementById("timeline");
        document.getElementById("runBtn").addEventListener("click", runDirector);

        async function runDirector() {
            const id = storyId.value.trim();
            const userMessage = taskInput.value.trim();
            if (!id || !userMessage) return;
            statusEl.textContent = "Running";
            const response = await fetch(`/stories/${id}/agent/run`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_message: userMessage, max_steps: Number(maxSteps.value || 6) }),
            });
            const run = await response.json();
            renderRun(run);
            statusEl.textContent = run.status || "Done";
        }

        function renderRun(run) {
            summary.innerHTML = `<strong>${escapeHtml(run.status || "-")}</strong><br>${escapeHtml(run.final_summary || "")}`;
            timeline.innerHTML = (run.steps || []).map(step => `
                <article class="step ${step.success ? "" : "failed"}">
                    <div class="step-top">
                        <span>#${step.step}</span>
                        <span class="tool">${escapeHtml(step.selected_tool)}</span>
                    </div>
                    <div>${escapeHtml(step.reasoning_summary || "")}</div>
                    <pre>${escapeHtml(JSON.stringify(step.tool_args || {}, null, 2))}</pre>
                    <div>${escapeHtml(step.observation || step.error || "")}</div>
                </article>
            `).join("");
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, char => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;",
            }[char]));
        }
    </script>
</body>
</html>
