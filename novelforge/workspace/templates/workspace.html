<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NovelForge 工作区</title>
  <link rel="stylesheet" href="/workspace-static/workspace.css">
</head>
<body data-story-id="{{ story_id }}">
  <header class="topbar">
    <div>
      <span class="eyebrow">NOVELFORGE</span>
      <h1>长篇故事工作区</h1>
    </div>
    <div class="top-actions">
      <a href="/docs" target="_blank">API</a>
      <a id="dashboardLink" href="/dashboard/" target="_blank">全景数据</a>
      <button id="exportBtn" class="ghost">导出 DOCX</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar card">
      <h2>项目</h2>
      <select id="storySelect"><option value="">选择已有故事</option></select>
      <label>标题<input id="titleInput" placeholder="故事标题"></label>
      <label>故事前提<textarea id="premiseInput" rows="5" placeholder="核心人物、目标、阻力与代价"></textarea></label>
      <button id="createBtn">创建故事</button>
      <div class="divider"></div>
      <label>章节数<input id="chapterCount" type="number" min="1" value="10"></label>
      <button id="outlineBtn" class="secondary">生成 / 补全大纲</button>
      <button id="batchBtn" class="ghost">从当前章批量写到末章</button>
      <p id="status" class="status">尚未加载故事</p>
    </aside>

    <section class="center card">
      <div class="section-head">
        <div><span class="eyebrow">DESIGN</span><h2>章节设计</h2></div>
        <select id="chapterSelect"><option value="">选择章节</option></select>
      </div>
      <div id="outlineCard" class="outline-card empty">先创建故事并生成大纲。</div>
      <div class="button-row">
        <button id="beatsBtn" class="secondary">规划场景</button>
        <button id="writeBtn">可靠生成</button>
        <button id="reviewBtn" class="secondary">评审</button>
        <button id="finalizeBtn" class="ghost">定稿</button>
      </div>
      <label>章节标题<input id="chapterTitle"></label>
      <label class="editor-label">正式正文<textarea id="chapterContent" class="editor" placeholder="只有通过门禁的生成内容，或用户明确保存的内容，才会进入这里。"></textarea></label>
      <div class="button-row end"><button id="saveBtn" class="secondary">保存人工编辑</button></div>
    </section>

    <aside class="inspector card">
      <div class="section-head"><div><span class="eyebrow">QUALITY</span><h2>质量与知识</h2></div></div>
      <div class="tabs">
        <button class="tab active" data-tab="report">质量报告</button>
        <button class="tab" data-tab="knowledge">知识状态</button>
        <button class="tab" data-tab="storage">存储状态</button>
      </div>
      <pre id="inspectorOutput">选择章节后可查看生成门禁、连续性和评审结果。</pre>
    </aside>
  </main>

  <script src="/workspace-static/workspace.js"></script>
</body>
</html>
