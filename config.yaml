llm:
  provider: mock
  model: deepseek-chat
  temperature: 0.8
  max_tokens: 4096
  base_url: https://api.deepseek.com

indexes:
  vector_store: chroma
  graph_store: networkx
  text_store: sqlite_fts

storage:
  database_path: ./.data/novelforge/novelforge.db
  artifact_directory: ./.data/novelforge/artifacts
  vector_index_directory: ./.data/novelforge/indexes/chroma
  graph_index_directory: ./.data/novelforge/indexes/graph
  full_text_index_path: ./.data/novelforge/indexes/fts.sqlite3

story:
  default_chapters: 10
  max_context_tokens: 6000
  auto_polish_drafts: true
  prose_target_words: 1800

logging:
  level: INFO

generation:
  min_quality_score: 7.5
  max_repairs: 2
  require_contract_pass: true
  require_continuity_pass: true

retrieval:
  type_weights:
    foreshadowing: 6.0
    character_state: 6.5
    timeline_event: 4.0
    world: 3.0
    character: 3.0
    chapter_summary: 2.0
  recency_max: 5.0
  recency_decay_base: 20.0
  entity_match_bonus: 7.0
  query_match_bonus_per_term: 2.0
  query_match_max: 8.0
